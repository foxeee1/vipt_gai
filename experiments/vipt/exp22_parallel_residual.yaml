# ============================================================
# 实验22: CVPR 2025层门控（Layer-wise Gating）
# ============================================================
# 【核心设计】
#   1. 三个模块全部启用：Consistency + Temporal + Mask
#   2. 完全保留最优注入层，不做任何妥协
#   3. 每层学习独立的门控，控制每个提示在该层的注入强度
#   4. 门控由该层的原始特征动态生成，完全自适应
#   5. 从根源上避免特征竞争
# ============================================================
# 【注入层配置】（完全保留最优层）
#   - Consistency: [5, 6, 7, 8, 9]
#   - Temporal: [5, 6, 7, 8, 9]
#   - Mask: [8, 9]
# ============================================================
# 【预期结果】
#   - val IoU 目标: 74.0-74.2（三个模块性能完美叠加）
# ============================================================

DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  STD:
  - 0.229
  - 0.224
  - 0.225
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
  TRAIN:
    DATASETS_NAME:
    - LasHeR_train
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 12000
  VAL:
    DATASETS_NAME:
    - LasHeR_val
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 1000
  XTYPE: 'rgbrgb'

MODEL:
  PRETRAIN_FILE: "./pretrained/OSTrack_ep0300_256.pth.tar"
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_ce_prompt
    STRIDE: 16
    CE_LOC: [3, 6, 9]
    CE_KEEP_RATIO: [0.7, 0.7, 0.7]
    CE_TEMPLATE_RANGE: 'CTR_POINT'
    META_PROMPT: True
    CONSISTENCY_VERSION: 'fusion'
    BASE_PROMPT_INJECT_LAYERS: [0]
    META_PROMPT_INJECT_LAYERS: [5, 6, 7, 8, 9]
    TEMPORAL_PROMPT_INJECT_LAYERS: [5, 6, 7, 8, 9]
    MASK_PROMPT_INJECT_LAYERS: [8, 9]
    COOP_STRATEGY: 'layer_gating'
    META_ENABLE_CONSISTENCY: True
    META_ENABLE_MASK: True
    META_ENABLE_TEMPORAL: True
    ENABLE_CROSS_ATTN: True
    ENABLE_VIS: True
    META_MODE: 'standard'
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256

TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  CE_START_EPOCH: 4
  CE_WARM_EPOCH: 16
  BATCH_SIZE: 48
  EPOCH: 60
  GIOU_WEIGHT: 3.0
  L1_WEIGHT: 4.0
  GRAD_CLIP_NORM: 0.5
  LR: 0.0006
  LR_DROP_EPOCH: 48
  NUM_WORKER: 16
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 3
  WEIGHT_DECAY: 0.0001
  AMP: True
  PROMPT:
    TYPE: vipt_deep
  FIX_BN: true
  SAVE_EPOCH_INTERVAL: 10
  SAVE_LAST_N_EPOCH: 1
  STAGE: 0
  META:
    ENABLE: False

TEST:
  EPOCH: 60
