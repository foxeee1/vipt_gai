# ============================================================
# 实验22: v24全链路优化版 — 分层解耦+正交正则+三阶段训练
# ============================================================
# 【v24核心改进 — 基于顶会方案整合】
#   1. 分层解耦注入（无重叠）：
#      - 模态专属Prompt: [1, 2, 3]  低层跨模态纹理对齐
#      - Consistency:      [5, 6]    中层跨模态语义融合
#      - Temporal:         [8, 9]    高层运动建模
#      - Mask:             [9]       最高层目标增强
#   2. 输入层模态类型Token：rgb_type_token/tir_type_token加法注入
#   3. 分层强度绑定：低层≤0.1，中高层≤0.2
#   4. 正交正则+KL散度+帧间平滑
#   5. 三阶段训练：Stage1模态→Stage2一致性+时序→Stage3联合微调
#   6. 早停机制：patience=5
# ============================================================
# 【三阶段训练说明】
#   Stage1 (epoch 1-10):  STAGE=1, 仅训练模态专属Prompt
#   Stage2 (epoch 11-25): STAGE=2, 训练Consistency+Temporal+Mask
#   Stage3 (epoch 26-40): STAGE=3, 全参数联合微调
#   使用方式：分三次运行，每次修改STAGE值并加载上次权重
# ============================================================

DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  STD:
  - 0.229
  - 0.224
  - 0.225
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
  TRAIN:
    DATASETS_NAME:
    - LasHeR_train
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 12000
  VAL:
    DATASETS_NAME:
    - LasHeR_val
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 1000
  XTYPE: 'rgbrgb'

MODEL:
  PRETRAIN_FILE: "./pretrained/OSTrack_ep0300_256.pth.tar"
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_ce_prompt
    STRIDE: 16
    CE_LOC: [3, 6, 9]
    CE_KEEP_RATIO: [0.7, 0.7, 0.7]
    CE_TEMPLATE_RANGE: 'CTR_POINT'
    META_PROMPT: True
    CONSISTENCY_VERSION: 'fusion'
    BASE_PROMPT_INJECT_LAYERS: [0]
    META_PROMPT_INJECT_LAYERS: [5, 6]
    TEMPORAL_PROMPT_INJECT_LAYERS: [8, 9]
    MASK_PROMPT_INJECT_LAYERS: [9]
    MODALITY_PROMPT_INJECT_LAYERS: [1, 2, 3]
    COOP_STRATEGY: 'layer_gating'
    META_ENABLE_CONSISTENCY: True
    META_ENABLE_MASK: True
    META_ENABLE_TEMPORAL: True
    ENABLE_CROSS_ATTN: True
    ENABLE_VIS: True
    META_MODE: 'standard'
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256

TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  CE_START_EPOCH: 4
  CE_WARM_EPOCH: 16
  BATCH_SIZE: 32
  EPOCH: 40
  GIOU_WEIGHT: 2.0
  L1_WEIGHT: 3.0
  GRAD_CLIP_NORM: 0.3
  LR: 0.0003
  LR_DROP_EPOCH: 30
  NUM_WORKER: 16
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 1
  WEIGHT_DECAY: 0.0005
  AMP: True
  PROMPT:
    TYPE: vipt_deep
  FIX_BN: true
  SAVE_EPOCH_INTERVAL: 10
  SAVE_LAST_N_EPOCH: 1
  STAGE: 0
  EARLY_STOP_PATIENCE: 5
  META:
    ENABLE: False

TEST:
  EPOCH: 40
