# ============================================================
# 实验7_temporal_layer8: Temporal Prompt 单层注入第8层
# ============================================================
# 【实验目的】验证v5时序提示在高层注入效果
# 【训练方式】标准训练(无FOMAML)
# 【注入层数】Base: [0], Temporal: [8]
# 【v5创新】跨模态-时序联合一致性建模（复用Consistency权重）
# ============================================================

DATA:
  MAX_SAMPLE_INTERVAL: 200
  MEAN:
  - 0.485
  - 0.456
  - 0.406
  STD:
  - 0.229
  - 0.224
  - 0.225
  SEARCH:
    CENTER_JITTER: 3
    FACTOR: 4.0
    SCALE_JITTER: 0.25
    SIZE: 256
    NUMBER: 1
  TEMPLATE:
    CENTER_JITTER: 0
    FACTOR: 2.0
    SCALE_JITTER: 0
    SIZE: 128
  TRAIN:
    DATASETS_NAME:
    - LasHeR_train
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 12000
  VAL:
    DATASETS_NAME:
    - LasHeR_val
    DATASETS_RATIO:
    - 1
    SAMPLE_PER_EPOCH: 1000
  XTYPE: 'rgbrgb'

MODEL:
  PRETRAIN_FILE: "./pretrained/OSTrack_ep0300_256.pth.tar"
  EXTRA_MERGER: False
  RETURN_INTER: False
  BACKBONE:
    TYPE: vit_base_patch16_224_ce_prompt
    STRIDE: 16
    CE_LOC: [3, 6, 9]
    CE_KEEP_RATIO: [0.7, 0.7, 0.7]
    CE_TEMPLATE_RANGE: 'CTR_POINT'
    META_PROMPT: True
    CONSISTENCY_VERSION: 'fusion'
    BASE_PROMPT_INJECT_LAYERS: [0]
    META_PROMPT_INJECT_LAYERS: [8]
    META_ENABLE_CONSISTENCY: False
    META_ENABLE_MASK: False
    META_ENABLE_TEMPORAL: True
    ENABLE_CROSS_ATTN: True
    ENABLE_VIS: True
    META_MODE: 'standard'
  HEAD:
    TYPE: CENTER
    NUM_CHANNELS: 256

TRAIN:
  BACKBONE_MULTIPLIER: 0.1
  DROP_PATH_RATE: 0.1
  CE_START_EPOCH: 4
  CE_WARM_EPOCH: 16
  BATCH_SIZE: 96
  EPOCH: 60
  GIOU_WEIGHT: 3.0
  L1_WEIGHT: 4.0
  GRAD_CLIP_NORM: 0.5
  LR: 0.0012
  LR_DROP_EPOCH: 48
  NUM_WORKER: 16
  OPTIMIZER: ADAMW
  PRINT_INTERVAL: 50
  SCHEDULER:
    TYPE: step
    DECAY_RATE: 0.1
  VAL_EPOCH_INTERVAL: 3
  WEIGHT_DECAY: 0.0001
  AMP: True
  PROMPT:
    TYPE: vipt_deep
  FIX_BN: true
  SAVE_EPOCH_INTERVAL: 10
  SAVE_LAST_N_EPOCH: 1
  META:
    ENABLE: False

TEST:
  EPOCH: 60
